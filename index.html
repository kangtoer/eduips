    <!-- Firebase SDK & Application Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ⚠️ SECURITY: Load Firebase config from environment variables or global window object
        // DO NOT hardcode credentials here
        // In production, inject these via build process or secure CDN headers
        const firebaseConfigStr = typeof __firebase_config !== 'undefined' ? __firebase_config : '{}';
        let firebaseConfig = {};
        try { firebaseConfig = JSON.parse(firebaseConfigStr); } catch (e) { console.error("Invalid Firebase config", e); }
        
        // Fallback: Check if loaded via environment (for build systems like Vite)
        if (Object.keys(firebaseConfig).length === 0) {
            firebaseConfig = {
                apiKey: import.meta.env.VITE_FIREBASE_API_KEY || '',
                authDomain: import.meta.env.VITE_FIREBASE_AUTH_DOMAIN || '',
                projectId: import.meta.env.VITE_FIREBASE_PROJECT_ID || '',
                storageBucket: import.meta.env.VITE_FIREBASE_STORAGE_BUCKET || '',
                messagingSenderId: import.meta.env.VITE_FIREBASE_MESSAGING_SENDER_ID || '',
                appId: import.meta.env.VITE_FIREBASE_APP_ID || ''
            };
            
            // Warn if no config found
            if (!firebaseConfig.projectId) {
                console.warn('⚠️  Firebase configuration not found. Please set environment variables.');
            }
        }
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : (import.meta.env.VITE_APP_ID || 'eduips-default-app');
        
        // Gemini API Configuration
        const DEFAULT_AI_MODEL = "gemini-2.5-flash-preview-09-2025";
        let MASTER_API_KEY = import.meta.env.VITE_GEMINI_API_KEY || ""; 
        
        const getGeminiEndpoint = (userKey) => {
            const finalKey = userKey || MASTER_API_KEY;
            if (!finalKey) {
                console.warn('⚠️  No Gemini API key configured. AI features will be disabled.');
                return null;
            }
            return `https://generativelanguage.googleapis.com/v1beta/models/${DEFAULT_AI_MODEL}:generateContent?key=${finalKey}`;
        };

        // Initialize Firebase
        let app, auth, db;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (error) {
            console.error('❌ Failed to initialize Firebase:', error);
        }

        // State Variables
        let currentUser = null;
        let userProfile = {};
        let gdriveToken = null;
        let localJournals = [];
        let localStudents = [];

        // DOM Elements mapping
        const ui = {
            views: { login: document.getElementById('login-view'), main: document.getElementById('main-app'), dashboard: document.getElementById('dashboard-view'), aiGenerator: document.getElementById('ai-generator-view'), bankSoal: document.getElementById('bank-soal-view'), bahanAjar: document.getElementById('bahan-ajar-view'), rubrik: document.getElementById('rubrik-view'), jurnalKelas: document.getElementById('jurnal-kelas-view'), dataSiswa: document.getElementById('data-siswa-view'), profile: document.getElementById('profile-view'), adminPanel: document.getElementById('admin-panel-view') },
            nav: { links: document.querySelectorAll('.nav-link'), adminMenu: document.getElementById('admin-menu-item'), headerTitle: document.getElementById('header-title') },
            profile: { form: document.getElementById('profile-form'), nama: document.getElementById('prof-nama'), nip: document.getElementById('prof-nip'), sekolah: document.getElementById('prof-sekolah'), isAdmin: document.getElementById('prof-isadmin'), apikey: document.getElementById('prof-apikey') },
            ai: {
                btnGenModul: document.getElementById('btn-generate-modul'), btnCopyModul: document.getElementById('btn-copy-modul'), btnPrintModul: document.getElementById('btn-print-modul'), btnGDriveModul: document.getElementById('btn-gdrive-modul'),
                btnGenSoal: document.getElementById('btn-generate-soal'), btnCopySoal: document.getElementById('btn-copy-soal'), btnPrintSoal: document.getElementById('btn-print-soal'), btnGDriveSoal: document.getElementById('btn-gdrive-soal'),
                btnGenBahan: document.getElementById('btn-generate-bahan'), btnCopyBahan: document.getElementById('btn-copy-bahan'), btnPrintBahan: document.getElementById('btn-print-bahan'), btnGDriveBahan: document.getElementById('btn-gdrive-bahan'),
                btnGenRubrik: document.getElementById('btn-generate-rubrik'), btnCopyRubrik: document.getElementById('btn-copy-rubrik'), btnPrintRubrik: document.getElementById('btn-print-rubrik'), btnGDriveRubrik: document.getElementById('btn-gdrive-rubrik')
            }
        };

        // UI Utilities
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            let bgClass = 'bg-blue-600', icon = 'fa-circle-info';
            if(type === 'success') { bgClass = 'bg-green-600'; icon = 'fa-check-circle'; }
            if(type === 'error') { bgClass = 'bg-red-600'; icon = 'fa-circle-exclamation'; }
            if(type === 'gdrive') { bgClass = 'bg-emerald-600'; icon = 'fa-brands fa-google-drive'; }
            toast.className = `${bgClass} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 fade-in max-w-sm z-50`;
            toast.innerHTML = `<i class="fa-solid ${icon}"></i> <span class="text-xs font-bold">${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'all 0.3s ease'; setTimeout(() => toast.remove(), 300); }, 4000);
        }

        function switchView(targetId) {
            ui.nav.links.forEach(link => {
                if(link.dataset.target === targetId) {
                    link.classList.add('text-primary', 'bg-blue-50', 'font-semibold'); link.classList.remove('text-slate-600');
                    ui.nav.headerTitle.innerText = link.innerText.trim();
                } else {
                    link.classList.remove('text-primary', 'bg-blue-50', 'font-semibold'); link.classList.add('text-slate-600');
                }
            });
            Object.values(ui.views).forEach(view => {
                if (view && view.id !== 'login-view' && view.id !== 'main-app') view.classList.toggle('hidden', view.id !== targetId);
            });
            if(targetId === 'admin-panel-view') loadAdminUsers();
        }

        // Authentication & Profile Data Logic
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                ui.views.login.classList.add('hidden'); ui.views.main.classList.remove('hidden');
                await loadUserProfile(); 
                switchView('dashboard-view');
            } else {
                currentUser = null; userProfile = {}; gdriveToken = null;
                ui.views.login.classList.remove('hidden'); ui.views.main.classList.add('hidden');
                document.getElementById('drive-status').classList.add('hidden');
            }
        });

        const provider = new GoogleAuthProvider();
        provider.addScope('https://www.googleapis.com/auth/drive.file');

        document.getElementById('btn-login-google').addEventListener('click', () => { 
            document.getElementById('login-loading').classList.remove('hidden'); 
            signInWithPopup(auth, provider).then((res) => {
                const credential = GoogleAuthProvider.credentialFromResult(res);
                if (credential && credential.accessToken) {
                    gdriveToken = credential.accessToken;
                    localStorage.setItem('gdrive_user_token', gdriveToken);
                }
            }).catch(e => {
                showToast("Gagal masuk dengan Google: " + e.message, "error");
                document.getElementById('login-loading').classList.add('hidden');
            }); 
        });

        document.getElementById('btn-login-anon').addEventListener('click', () => { 
            document.getElementById('login-loading').classList.remove('hidden'); 
            signInAnonymously(auth).catch(e => {
                showToast(e.message, "error");
                document.getElementById('login-loading').classList.add('hidden');
            }); 
        });

        document.getElementById('btn-logout').addEventListener('click', () => {
            localStorage.removeItem('gdrive_user_token');
            signOut(auth);
        });

        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) signInWithCustomToken(auth, __initial_auth_token).catch(e=>console.log("No custom token fallback"));

        async function loadUserProfile() {
            if (!currentUser || !db) return;
            const userId = currentUser.uid;
            const privateRef = doc(db, 'artifacts', appId, 'users', userId, 'profileData', 'default');
            try {
                const docSnap = await getDoc(privateRef);
                if (docSnap.exists()) { 
                    userProfile = docSnap.data(); 
                } else {
                    userProfile = { 
                        nama: currentUser.displayName || "Guru IPS", 
                        nip: "", 
                        sekolah: "MTS / SMP Negeri", 
                        isAdmin: false,
                        customApiKey: ""
                    };
                    await setDoc(privateRef, userProfile);
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', userId), { nama: userProfile.nama, nip: userProfile.nip, sekolah: userProfile.sekolah, role: 'Guru' });
                }
                
                localJournals = userProfile.journals || [];
                localStudents = userProfile.students || [];
                
                gdriveToken = localStorage.getItem('gdrive_user_token');
                
                updateProfileUI();
                renderJournalTable();
                renderSiswaTable();
                syncDashboardStates();
            } catch (error) { console.error(error); showToast("Gagal memuat profil", "error"); }
        }

        function updateProfileUI() {
            ui.profile.nama.value = userProfile.nama || ''; 
            ui.profile.nip.value = userProfile.nip || ''; 
            ui.profile.sekolah.value = userProfile.sekolah || ''; 
            ui.profile.isAdmin.checked = userProfile.isAdmin || false;
            ui.profile.apikey.value = userProfile.customApiKey || '';
        }

        // Additional placeholder functions referenced in HTML
        function renderJournalTable() { /* Implementation */ }
        function renderSiswaTable() { /* Implementation */ }
        function syncDashboardStates() { /* Implementation */ }
        function loadAdminUsers() { /* Implementation */ }
    </script>
